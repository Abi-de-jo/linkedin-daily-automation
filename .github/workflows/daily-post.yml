name: Daily LinkedIn Post

on:
  schedule:
    # Run every day at 8:00 AM IST (UTC+5:30) → 2:30 AM UTC
    # Adjust the cron expression if you're in a different timezone:
    #   IST (UTC+5:30): '30 2 * * *'
    #   EST (UTC-5):    '0 13 * * *'
    #   PST (UTC-8):    '0 16 * * *'
    - cron: '30 2 * * *'
  workflow_dispatch:
    # Allow manual trigger for testing
    inputs:
      mode:
        description: 'post or preview'
        required: true
        default: 'post'
        type: choice
        options:
          - post
          - preview

jobs:
  linkedin-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate and post to LinkedIn
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
        run: |
          MODE="${{ github.event.inputs.mode }}"
          if [ "${{ github.event_name }}" = "schedule" ]; then
            # Cron schedule → always post
            node src/index.mjs post
          elif [ "$MODE" = "preview" ]; then
            # Manual preview — generate and print, don't post
            node src/index.mjs preview
          else
            # Manual post
            node src/index.mjs post
          fi

      - name: Log success
        if: success()
        run: echo "✅ LinkedIn post published successfully on $(date)"
